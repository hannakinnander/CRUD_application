<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUD-application</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <header>
        <h1>Mina resor ☀️✈️</h1>
    </header>
    <main>

            <select id="continentSelector">
                <option value="">Visa alla världsdelar</option>
                <option value="1">Asien</option>
                <option value="2">Afrika</option>
                <option value="3">Nordamerika</option>
                <option value="4">Sydamerika</option>

                <option value="6">Oceanien</option>
                <option value="7">Antarktis</option>
            </select>
        </div>
    </main>
</body>
</html>
