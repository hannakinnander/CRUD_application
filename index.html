<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUD-application</title>
    <link rel="stylesheet" href="style.css">
    <script type="module" src="js-modules/script.js" defer></script>
</head>
<body>
    <header>
        <h1>Mina resor ☀️✈️</h1>
    </header>
    
    <main>
        <div class="overlay hidden"></div>
            <div class="menu">
                <div class="addDestinationField">
                <div class="makeFlexColumn">
                    <label for="countryInput">Destination: </label>
                    <input id="countryInput">
                </div>
                <div class="makeFlexColumn">
                    <label for="yearInput">Besöktes år: </label>
                    <input id="yearInput">
                </div>
                <div class="makeFlexColumn">
                    <label for="businessOrPleasureSelector">Typ av resa: </label>
                    <select id="businessOrPleasureSelector">
                    <option value="business">Business</option>
                    <option value="pleasure">Pleasure</option>
                </select>
                </div>
                <div class="makeFlexColumn">
                    <label for="addContinentSelector">Världsdel: </label>
                    <select id="addContinentSelector">
                    <option value="1">Asien</option>
                    <option value="2">Afrika</option>
                    <option value="3">Nordamerika</option>
                    <option value="4">Sydamerika</option>
                    <option value="5">Europa</option>
                    <option value="6">Oceanien</option>
                    <option value="7">Antarktis</option>
                </select>
                </div>
                
                <button class="saveDestinationButton">Spara</button>
            </div>
                <select id="continentSelector">
                    <option value="">Visa alla resor</option>
                    <option value="1">Visa resor till Asien</option>
                    <option value="2">Visa resor till Afrika</option>
                    <option value="3">Visa resor till Nordamerika</option>
                    <option value="4">Visa resor till Sydamerika</option>
                    <option value="5">Visa resor till Europa</option>
                    <option value="6">Visa resor till Oceanien</option>
                    <option value="7">Visa resor till Antarktis</option>
                </select>
            </div>
            
            <div class="showCountriesDiv"></div>
        </div>
    </main>
    
</body>
</html>
